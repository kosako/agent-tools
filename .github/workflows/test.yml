# self-tests と repository checks を PR / push ごとに実行する。
# scripts は macOS 標準 Ruby 前提なので macOS runner を使う。
# 外部 dependency の install と secrets は不要。
name: test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  self-tests:
    runs-on: macos-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        # system = macOS 標準 Ruby (2.6 / psych 3) が配備先の床。3.4 は yaml_util.rb の
        # psych >= 4 分岐を CI の dead path にしないための現行 Ruby (#150)。
        ruby: [system, "3.4"]
    steps:
      # 外部 action は full commit SHA で pin する (タグ移動による差し替え対策)。
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # テストが repo 内の scripts を実行するため、token を .git/config に残さない。
          persist-credentials: false

      # scripts/*.sh は PATH の ruby を exec するため、PATH 先頭を差し替えるだけで
      # matrix の Ruby に切り替わる。system 行では何もしない (macOS 標準 Ruby のまま)。
      - name: Set up Ruby ${{ matrix.ruby }}
        if: matrix.ruby != 'system'
        uses: ruby/setup-ruby@d45b1a4e94b71acab930e56e79c6aa188764e7f9 # v1.316.0
        with:
          ruby-version: ${{ matrix.ruby }}

      # system 行の存在理由は「配備先の床 = psych < 4 (現に 2.6 / psych 3)」の検証。
      # macos-latest の更新で system Ruby が psych >= 4 になると、この床が黙って
      # 無検証化する (両行とも psych >= 4 = 床側の分岐が dead path 化) ため、前提が
      # 崩れた時点で CI を落として matrix の見直しを迫る (#176 Low)。
      - name: Assert system Ruby is the psych 3 floor
        if: matrix.ruby == 'system'
        run: |
          ruby -rpsych -e 'v = Psych::VERSION; puts "system ruby #{RUBY_VERSION} / psych #{v}"
            abort "system Ruby is no longer the psych <4 floor; revisit the CI matrix (#176)" \
              unless v.split(".").first.to_i < 4'

      - name: Run self-tests
        run: |
          # 最初の失敗で止めず全 test を走らせ、1 回の CI で全失敗を可視化する。
          failed=0
          for t in scripts/tests/*.sh; do
            echo "--- $t"
            "$t" || { echo "FAIL: $t"; failed=1; }
          done
          exit "$failed"

      - name: Check repository assets
        run: |
          scripts/check-manifests.sh
          # high (exit 1) / usage (exit 2) は fail。medium (exit 3) は human_review:approved
          # を register が gate するため、ここでは許容する (照合は register step が担う)。
          scripts/check-injection.sh || { rc=$?; [ "$rc" -eq 3 ] || exit "$rc"; }

      - name: Build, register, and report status
        run: |
          scripts/build.sh
          scripts/register.sh
          # status / doctor は runner の実 ~/.codex 等を読まないよう空 home を渡す
          # (環境依存の結果を避ける。CI では build/register の健全性だけ見る)。
          homes="$RUNNER_TEMP/emptyhomes"
          mkdir -p "$homes/codex" "$homes/claude" "$homes/agents"
          scripts/status.sh --json --codex-home "$homes/codex" --claude-home "$homes/claude"
          scripts/doctor.sh --codex-home "$homes/codex" --claude-home "$homes/claude" --agents-home "$homes/agents"
