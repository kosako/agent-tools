schema_version: 1
name: personal-safe-gh
kind: script
visibility: personal
targets:
  - codex
  - claude-code
risk:
  prompt_injection: low
  privacy: low
# script kind は実行コード配布のため常に human review 必須 (#147)。
# 本 script は PR #135 / #141 / #156 / #160 (+ usage 文言の #176 M-05 是正) で
# author≠reviewer レビュー済み・承認。
# 承認は内容と配布形態に紐づく (#148, #184)。source 変更時は再レビューして
# approved_build_id を、kind 変更時は approved_artifact_kind を更新する。
review:
  human_review: approved
  approved_build_id: sha256:5a46739b2219e34034e959842e3cd98b5a3ed58c0a2d03fe276a5e59be4232ac
  approved_artifact_kind: script
source:
  path: shared/scripts/personal-safe-gh.rb
  format: text
summary: >-
  GitHub の Issue/PR/コメントを untrusted data として安全に読む steering wrapper。
  他人の Issue/PR は metadata のみ、他人コメントは count のみを出力し、runtime prompt
  injection 面を狭める。enforcement boundary ではない (docs/runtime-injection-defense.md)。
