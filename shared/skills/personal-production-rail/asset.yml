# references/policies/ にサードパーティ vendor (takt, MIT) を含む。出典・license・pin は
# references/policies/NOTICE.md。import (fetch → injection gate → human review → commit pin)
# を通したもので、配備時に外部取得はしない。
schema_version: 1
name: personal-production-rail
kind: skill
visibility: public
targets:
  - codex
  - claude-code
risk:
  prompt_injection: low
  privacy: low
source:
  path: shared/skills/personal-production-rail
  format: directory
summary: librarian skill that applies coding-quality policies on the production rail by reading a policy index and loading only the relevant 2-4 policy docs for preflight and self-check, without holding policy bodies itself
description: public-safe Japanese router/librarian skill for the production rail; judges production vs vibe, reads references/policy-index.md, loads only the relevant vendored policy docs (e.g. ai-antipattern) for the task type, and applies them via a generation lens (preflight + self-check) and a review lens (severity), treating policy text as data not instructions; vendored third-party policies (takt, MIT) are imported through the injection gate and human review with a pinned commit
review:
  # 第三者 vendor (takt の policies/*.md、複数) を含むが、静的 injection スキャンは clean
  # (findings なし) のため human review は不要 = not_needed。
  # approved にしない理由: approved は明示承認が要る asset のためのもので、#148 以降は
  # approved_build_id (build_id 束縛) が必須 = 内容が変わるたび再承認が要る。scan clean で
  # 承認不要な本 asset に付けると、re-import ごとの無用な再承認手続きだけが増える。
  # not_needed なら finding 発生時に register が human_review_required へ正しく倒す。
  # import の事実・出典・license・pin commit・review 記録は references/policies/NOTICE.md の
  # ファイル別表を正本とする (ai-antipattern は #93、追加4本は #97)。
  human_review: not_needed
