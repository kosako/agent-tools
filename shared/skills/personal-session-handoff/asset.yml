description: "Outcome: preserve session outcomes, decisions, unfinished work, and the next entry point. Trigger: session-end or handoff intent; implicit milestones draft only. Use: closing a work session. Do not use: session-start status or continuation. Side effects: both the write and its destination need trusted scoped authorization; note-derived sinks remain candidates, otherwise output is a conversation draft and .agent-context.local.md stays read-only. Compose with: personal-resume-project and personal-project-operating-loop."
